		<script> 
		
		var texto='',texto1='';
		var num= '';
		var letras =["a","b","c","d","e"];
		var cantidad=[12,15,17,13,11];
		var obj =['ca','go','flo','la','m'];

		var comilla="'";

		 for (var i = 0 ; i <= 4; i++){

			 for (var j = 1 ; j <= 9; j++)
			  {								
				texto+='<img id="num'+letras[i]+j+'" class="numeroTabla" src="img/'+j+'.png" style="display: none;"></img>';
				num+='<img id="numero'+letras[i]+j+'" class="numero'+j+'" src="img/'+j+'.png" onclick="seleccion('+j+','+comilla+letras[i]+comilla+')"></img>';
			  }	
			  	$('#imagenes'+letras[i]).append(texto);
				$('#numeros'+letras[i]).append(num);
				texto='';
				num='';
			}	

		 for (var b = 0 ; b <= 4 ; b++){

			 for (var a = 1 ; a <= cantidad[b] ; a++){

			 	texto1+='<img id="'+obj[b]+a+'" class="objeto'+b+'" src="img/'+obj[b]+'1.png" onclick="desaparecer('+comilla+obj[b]+a+comilla+','+comilla+obj[b]+comilla+')">';
			 }		
				$('.balones'+b).append(texto1);
				texto1='';
		}

	</script>
