	<script>

	$(document).ready(function() {
		$(document).on( 'shown.bs.tab', 'a[data-toggle="tab"]', function (e) {
			var str = String(e.target);
			var tabNum = str.substr(str.indexOf("#") + 1).substr(3,4);  
			playAudio(tabNum);

   			console.log(tabNum); // activated tab
		})
	  	
		window.prettyPrint && prettyPrint()
	});	

	var set1='',set2='',set3='',set4='',set5='',set6='',set7='',set8='',set9='' ,set10='' ,set11='',set12='',set13='' ,set14='';

	function playAudio(num){
	  //pause playing
		$("audio").trigger('pause');
		//set play time to 0
		$("audio").prop('currentTime',0);
		$("#au" + num).trigger('play');

		if (num==1){
			
			set1 = setTimeout(function(){$(".tablaunidades").attr('style','display:table')},13000);
				

			//CANCELO LOS DEL 2

			$(".estudiantes1, .estudiantes2, .tablaestudiantes, .dos, .tres, .dosa, .cinco, .tres, .ochoa, .cuatro, .total").attr('style','display:none');


			clearTimeout(set2);
			clearTimeout(set3);
			clearTimeout(set4);
			clearTimeout(set5);
			clearTimeout(set6);
			clearTimeout(set7);
			clearTimeout(set8);
			clearTimeout(set9);	
			clearTimeout(set10);
			clearTimeout(set11);
			clearTimeout(set12);
			clearTimeout(set13);
			clearTimeout(set14);
			
		}

		else if(num==2)

		{

			//CANCELO LOS DEL 1

			$(".tablaunidades").attr('style','display:none');


			clearTimeout(set1);
			

			set2 = setTimeout(function(){$(".estudiantes1").attr('style','display:table')},4000);
			set3 = setTimeout(function(){$(".estudiantes2").attr('style','display:table')},7000);
			set4 = setTimeout(function(){$(".tablaestudiantes").attr('style','display:table')},10000);
			set4 = setTimeout(function(){$(".dos").attr('style','display:table')},11000);
			set5 = setTimeout(function(){$(".tres").attr('style','display:table')},12000);
			set6 = setTimeout(function(){$(".dosa").attr('style','display:table')},13000);
			set7 = setTimeout(function(){$(".cinco").attr('style','display:table')},14000);
			set8 = setTimeout(function(){$(".tres").attr('style','display:table; animation: 2s zoomIn')},17000);
			set9 = setTimeout(function(){$(".cinco").attr('style','display:table; animation: 2s zoomIn')},18000);
			set10 = setTimeout(function(){$(".ochoa").attr('style','display:table')},19000);
			set11 = setTimeout(function(){$(".dos").attr('style','display:table; animation: 2s zoomIn')},24000);
			set12 = setTimeout(function(){$(".dosa").attr('style','display:table; animation: 2s zoomIn')},25000);
			set13 = setTimeout(function(){$(".cuatro").attr('style','display:table')},26000);
			set14 = setTimeout(function(){$(".total").attr('style','display:table')},29000);
		}

		else if(num==3)
		{

			//CANCELO LOS DEL 2
			
			$(".estudiantes1, .estudiantes2, .tablaestudiantes, .dos, .tres, .dosa, .cinco, .tres, .ochoa, .cuatro, .total").attr('style','display:none');


			clearTimeout(set2);
			clearTimeout(set3);
			clearTimeout(set4);
			clearTimeout(set5);
			clearTimeout(set6);
			clearTimeout(set7);
			clearTimeout(set8);
			clearTimeout(set9);	
			clearTimeout(set10);
			clearTimeout(set11);
			clearTimeout(set12);
			clearTimeout(set13);
			clearTimeout(set14);
		}

	}

	set1 = setTimeout(function(){$(".tablaunidades").attr('style','display:table')},13000);
