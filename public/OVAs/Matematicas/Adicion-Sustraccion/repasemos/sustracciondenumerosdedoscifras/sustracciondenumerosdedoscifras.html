	<script>

	$(document).ready(function() {
		$(document).on( 'shown.bs.tab', 'a[data-toggle="tab"]', function (e) {
			var str = String(e.target);
			var tabNum = str.substr(str.indexOf("#") + 1).substr(3,4);  
			playAudio(tabNum);

   			console.log(tabNum); // activated tab
		})
	  	
		window.prettyPrint && prettyPrint()
	});	

var set1='',set2='',set3='',set4='',set5='',set6='',set7='',set8='',set9='',set10='',set11='';
	function playAudio(num){
	  //pause playing
		$("audio").trigger('pause');
		//set play time to 0
		$("audio").prop('currentTime',0);
		$("#au" + num).trigger('play');

		if (num==1) {
			set1=setTimeout(function(){$(".manzanas1").attr('style','display:table')}, 17000);
			set2=setTimeout(function(){$(".manzanas2").attr('style','display:table')}, 19000);
			set3=setTimeout(function(){$(".pregunta").attr('style','display:table')}, 21000);
			set4=setTimeout(function(){$(".cuadro").attr('style','display:table')}, 24000);
			set5=setTimeout(function(){$(".siete").attr('style','display:table')}, 25000);
			set6=setTimeout(function(){$(".cinco").attr('style','display:table')}, 26000);
			set7=setTimeout(function(){$(".tres").attr('style','display:table')}, 27000);
			set8=setTimeout(function(){$(".dos").attr('style','display:table')}, 28000);
			set9=setTimeout(function(){$(".tres2").attr('style','display:table')}, 33000);
			set10=setTimeout(function(){$(".cuatro").attr('style','display:table')}, 40000);
			set11=setTimeout(function(){$(".resultado").attr('style','display:table')}, 44000);
		}
		else if (num==2) {
			clearTimeout(set1);
			clearTimeout(set2);
			clearTimeout(set3);
			clearTimeout(set4);
			clearTimeout(set5);
			clearTimeout(set6);
			clearTimeout(set7);
			clearTimeout(set8);
			clearTimeout(set9);
			clearTimeout(set10);
			clearTimeout(set11);
			$(".manzanas1, .manzanas2, .pregunta, .cuadro, .siete, .cinco, .tres, .dos, .tres2, .cuatro, .resultado").attr('style','display:none')
		}
	}

	set1=setTimeout(function(){$(".manzanas1").attr('style','display:table')}, 17000);
	set2=setTimeout(function(){$(".manzanas2").attr('style','display:table')}, 19000);
	set3=setTimeout(function(){$(".pregunta").attr('style','display:table')}, 21000);
	set4=setTimeout(function(){$(".cuadro").attr('style','display:table')}, 24000);
	set5=setTimeout(function(){$(".siete").attr('style','display:table')}, 25000);
	set6=setTimeout(function(){$(".cinco").attr('style','display:table')}, 26000);
	set7=setTimeout(function(){$(".tres").attr('style','display:table')}, 27000);

	set11=setTimeout(function(){$(".resultado").attr('style','display:table')}, 44000);
